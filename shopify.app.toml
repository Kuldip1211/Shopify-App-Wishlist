client_id = "554d0381e2e9de8110b514995b43a481"
name = "wishlist"
application_url = "https://nontraversable-fearfully-kaylin.ngrok-free.dev"
embedded = true

[build]
automatically_update_urls_on_dev = true

[app_proxy]
url = "https://nontraversable-fearfully-kaylin.ngrok-free.dev"
